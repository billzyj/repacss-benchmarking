version: 1
id: repacss_zen4
site: repacss

scheduler:
  type: slurm
  submit_cmd: sbatch
  defaults:
    partition: zen4
    nodes: 1
    ntasks: 256
    cpus_per_task: 1
    mem: 0
    time: "24:00:00"

environment_resolution:
  priority: [module, spack, source]
  modules:
    mpi: mpich/4.1.2
    pmix: pmix/5.0.3

runtime:
  launcher: mpirun
  gpu_vendor: none

paths:
  workspace_root: "${HOME}/data"
