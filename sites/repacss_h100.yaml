version: 1
id: repacss_h100
site: repacss

scheduler:
  type: slurm
  submit_cmd: sbatch
  defaults:
    partition: h100
    nodes: 1
    ntasks: 1
    cpus_per_task: 8
    gres: gpu:4
    mem: 0
    time: "01:00:00"

environment_resolution:
  priority: [module, spack, source]
  modules:
    cuda: cuda/12.9.0

runtime:
  launcher: srun
  gpu_vendor: nvidia
  telemetry_backend: nvidia_smi

paths:
  workspace_root: "${HOME}/data"
