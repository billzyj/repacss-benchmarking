name: Repository Layout Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  layout-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Shell script syntax check
        run: |
          find benchmark_recipes repacss_runtime repo_tools -name '*.sh' -print0 | xargs -0 bash -n

      - name: Repository structure check
        run: |
          bash repo_tools/check_repo_layout.sh
