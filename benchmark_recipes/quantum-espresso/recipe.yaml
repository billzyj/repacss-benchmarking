id: quantum_espresso
name: Quantum Espresso
status: experimental
partition: zen4
hardware_reference: repacss_cluster/hardware.yaml#partitions.zen4
run_mode: launcher
classification_source: benchmark_index/benchmarks.yaml

installation:
  default_method: user_spack
  supported_methods: [system_modules, user_spack, user_source]
  system_modules:
    role: dependency_stack
    module_inventory: repacss_cluster/modules.yaml#partitions.zen4
    benchmark_modules: []
    dependency_modules:
      - gcc/15.2.0
      - openmpi/4.1.8
      - openblas/0.3.30
  user_spack:
    package: quantum-espresso
  user_source:
    upstream: https://github.com/QEF/q-e.git

commands:
  install: install.sh
  run: run.sh
  parse: parse.sh

dataset:
  default_id: small
  root_env: DATASET_ROOT
  profiles:
    small:
      required_files:
        - inputs/si/si_sssp.scf.in
      run_args: "QE_INPUT_FILE=inputs/si/si_sssp.scf.in"
    production:
      required_files:
        - "${DATASET_ROOT}/quantum-espresso/si_long_md.in"
      run_args: "QE_INPUT_FILE=${DATASET_ROOT}/quantum-espresso/si_long_md.in"
