id: dummy
name: Dummy Benchmark (Template)
artifact_type: benchmark
adapter_default: repacss

datasets:
  id_env: DATASET_ID
  root_env: DATASET_ROOT
  profiles: [param_small, file_small, prod]

inputs:
  mode: hybrid
  supported_modes: [parametric, file_bundle, hybrid]
  profile_env: DATASET_ID
  root_env: DATASET_ROOT
  profiles:
    param_small:
      mode: parametric
      required_files: []
      run_args: "--size 1024 --iters 10"
    file_small:
      mode: file_bundle
      required_files:
        - "inputs/dummy_small.in"
      run_args: "--input inputs/dummy_small.in"
    prod:
      mode: hybrid
      required_files:
        - "${DATASET_ROOT}/dummy/prod_case.in"
      run_args: "--input ${DATASET_ROOT}/dummy/prod_case.in --iters 1000"

adapters:
  repacss:
    prepare: adapters/repacss/prepare.sh
    run: adapters/repacss/run.sh
    parse: adapters/repacss/parse.sh
    run_mode: launcher

notes:
  - This is a starter template. Replace names/args/files with real benchmark values.
