id: lammps
name: LAMMPS
artifact_type: benchmark
adapter_default: repacss
datasets:
  id_env: DATASET_ID
  root_env: DATASET_ROOT
  profiles: [small, production]
inputs:
  mode: file_bundle
  supported_modes: [file_bundle]
  profile_env: DATASET_ID
  root_env: DATASET_ROOT
  profiles:
    small:
      mode: file_bundle
      required_files:
        - "inputs/lj/in.lj"
      run_args: "LAMMPS_INPUT=inputs/lj/in.lj"
    production:
      mode: file_bundle
      required_files:
        - "${DATASET_ROOT}/lammps/in.lj"
      run_args: "LAMMPS_INPUT=${DATASET_ROOT}/lammps/in.lj"
adapters:
  repacss:
    prepare: adapters/repacss/prepare.sh
    run: adapters/repacss/run.sh
    parse: adapters/repacss/parse.sh
    run_mode: slurm_batch
notes:
  - Run adapter is a Slurm batch script for REPACSS Zen4.
